name: CI

on:
  push:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npx tsc
      - name: Тесты env
        run: npm run test:env
      - name: Тесты sqliteStore
        run: npm run test:sqliteStore
      - name: Интеграционные тесты
        run: npm run test:integration
      - name: Аудит зависимостей
        run: npm audit --audit-level=high

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - name: Установка браузера
        run: npx playwright install --with-deps chrome
      - name: Playwright
        run: npm run test:playwright
      - name: Артефакты при падении
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            test-results/
            playwright-report/
          retention-days: 7
